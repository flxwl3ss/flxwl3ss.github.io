<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --accent2: #7b61ff;
            --text: rgba(255, 255, 255, 0.85);
            --text-dim: rgba(255, 255, 255, 0.45);
            --glass: rgba(10, 10, 20, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shine: rgba(255, 255, 255, 0.05);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        .wallpaper-bg {
            position: fixed; inset: 0;
            background: url('https://i.ibb.co/wrQL1CR1/wallpaper.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.75);
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.75) 100%);
            pointer-events: none;
        }

        .scanner {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.08; top: 0;
            animation: scan 8s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .credit-footer {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; font-size: 0.75rem;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .credit-footer a {
            color: var(--accent); text-decoration: none;
            opacity: 0.55; transition: opacity 0.3s;
        }
        .credit-footer a:hover { opacity: 1; text-decoration: underline; }

        /* ── MAIN CARD ── */
        .main-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(420px, 90vw);
            background: var(--glass);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 0 0 1px var(--glass-shine) inset,
                0 30px 80px rgba(0,0,0,0.55),
                0 0 60px rgba(0, 212, 255, 0.06);
            padding: 36px 32px 28px;
            display: flex; flex-direction: column; gap: 28px;
            animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translate(-50%, -46%) scale(0.96); }
            to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .main-card::before {
            content: ''; position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            border-radius: 100%;
        }

       
        /* ── NAME SECTION ── */
        .name-section { text-align: left; }
        .name-display {
            font-size: 2.1rem; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.1;
        }
        .name-sub {
            font-size: 0.78rem; color: var(--text-dim);
            margin-top: 4px; letter-spacing: 1px;
        }

        /* ── SOCIAL DOCK (inside card) ── */
        .social-dock {
            display: flex; gap: 15px;
            margin-top: 10px;
        }
        .social-dock a {
            color: var(--text-dim); font-size: 1.15rem;
            transition: all 0.3s ease; text-decoration: none;
        }
        .social-dock a:hover {
            color: var(--accent); transform: scale(1.2);
            text-shadow: 0 0 12px var(--accent);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }


    </style>
</head>
<body>
    <div class="wallpaper-bg"></div>
    <div class="vignette"></div>
    <div class="scanner"></div>


    <div class="main-card">

        <!-- Name + social dock -->
        <div class="name-section">
            <div class="name-display">flawlessaim</div>
            <div class="name-sub">welcome to my page</div>
            <div class="social-dock">
                <a href="https://steamcommunity.com/id/flawless001" title="Steam"><i class="fa-brands fa-steam"></i></a>
                <a href="https://kovaaks.com/kovaaks/profile?username=flawlessaim" title="Kovaaks"><i class="fa-solid fa-bullseye"></i></i></a>
            </div>
        </div>

        <div class="divider"></div>

        <div class="player">
            <div class="player-track">
                
                <iframe data-testid="embed-iframe" style="border-radius:12px" 
                src="https://open.spotify.com/embed/track/4ZjAfdKKRfibE5gVDkDCWs?utm_source=generator" 
                width="100%" height="152" frameBorder="0" allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"></iframe>
            </div>
            
        </div>
    </div>

    <div class="credit-footer">
        art by: <a href="https://x.com/divinefracture" target="_blank">https://x.com/divinefracture</a>
    </div>

    <script>
    (() => {

        const allMedia = document.querySelectorAll('audio, video');

            allMedia.forEach(media => {
            media.volume = 0.3;
            });

    })();
    </script>
</body>
</html>
